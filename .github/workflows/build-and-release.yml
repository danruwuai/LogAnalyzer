name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build (without publish)
      run: npx electron-builder --win
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create ZIP archive
      run: Compress-Archive -Path dist\win-unpacked\* -DestinationPath dist\LogAnalyzer-${{ github.ref_name }}-win64.zip
    
    - name: Create Release and Upload All Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/LogAnalyzer-*.exe
          dist/LogAnalyzer-*-win64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
