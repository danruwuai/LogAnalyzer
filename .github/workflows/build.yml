name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create self-signed code signing certificate
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=LogAnalyzer Dev" -CertStoreLocation "Cert:\CurrentUser\My" -NotAfter (Get-Date).AddYears(1)
          $pwd = ConvertTo-SecureString -String "LogAnalyzer123" -Force -AsPlainText
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath "codesign.pfx" -Password $pwd
          echo "CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build webpack
        run: npm run build

      - name: Build Electron (NSIS + Portable)
        run: npx electron-builder --win
        env:
          CSC_LINK: "${{ github.workspace }}\codesign.pfx"
          CSC_KEY_PASSWORD: "LogAnalyzer123"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogAnalyzer-exe
          path: |
            dist/*.exe
            !dist/*.blockmap
          retention-days: 30
