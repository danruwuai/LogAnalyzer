name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack
        run: npm run build

      - name: Build Electron (NSIS + Portable)
        run: npx electron-builder --win --config.win.target=nsis,portable

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogAnalyzer-exe
          path: dist/*.exe
          retention-days: 30
