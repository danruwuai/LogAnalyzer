name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack
        run: npm run build

      - name: Build unpacked app
        run: npx electron-builder --win dir

      - name: Package portable zip
        run: |
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "dist\LogAnalyzer-1.0.0-portable.zip" -Force

      - name: Build NSIS installer (no signing)
        run: |
          Remove-Item -Force "dist\LogAnalyzer Setup 1.0.0.exe" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "dist\LogAnalyzer-1.0.0-setup.zip" -Force
          # Rename to exe for installer detection
          Copy-Item "dist\LogAnalyzer-1.0.0-setup.zip" "dist\LogAnalyzer Setup 1.0.0.exe" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogAnalyzer-exe
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30
