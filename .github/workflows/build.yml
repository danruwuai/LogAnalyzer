name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack
        run: npm run build

      - name: Build NSIS installer
        run: npx electron-builder --win nsis
        env:
          # 确保不尝试签名
          CSC_LINK: ""
          ELECTRON_BUILDER_SIGNING_HASH: ""

      - name: Build Portable
        run: npx electron-builder --win portable
        env:
          CSC_LINK: ""
          ELECTRON_BUILDER_SIGNING_HASH: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogAnalyzer-exe
          path: |
            dist/*.exe
            !dist/*blockmap
          retention-days: 30
